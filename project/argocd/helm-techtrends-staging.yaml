apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: techtrends-staging
  namespace: argocd
spec:
  destination:
    namespace: staging
    server: https://kubernetes.default.svc
  project: default
  source:
    repoURL: https://github.com/wbrtdc/nd064_course_1.git
    targetRevision: main
    path: project/helm
    helm:
      parameters:
        - name: image.repository
          value: wbrtdc/techtrends
      valueFiles:
        - values-staging.yaml
